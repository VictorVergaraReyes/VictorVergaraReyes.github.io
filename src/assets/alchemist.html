<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Cyberpunk Vaporwave Portfolio</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&amp;family=VT323&amp;family=Rajdhani:wght@300;500;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#D900FF", // Neon Magenta
                        secondary: "#00E5FF", // Neon Cyan
                        "background-light": "#f3f4f6", // Very light gray (almost white) for a harsh contrast if light mode is forced (though this theme screams dark mode)
                        "background-dark": "#050014", // Deep dark purple/black
                        "surface-dark": "#120526",
                        "accent-red": "#FF003C",
                    },
                    fontFamily: {
                        display: ["Orbitron", "sans-serif"],
                        mono: ["VT323", "monospace"],
                        body: ["Rajdhani", "sans-serif"],
                    },
                    //backgroundImage: {
                    //  'cyber-grid': "linear-gradient(to right, rgba(217, 0, 255, 0.1) 1px, transparent 1px), linear-gradient(to bottom, rgba(217, 0, 255, 0.1) 1px, transparent 1px)",
                    //'vignette': 'radial-gradient(circle, transparent 50%, #050014 100%)',
                    //},
                    animation: {
                        'glitch': 'glitch 2s infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'scanline': 'scanline 8s linear infinite',
                    },
                    keyframes: {
                        glitch: {
                            '0%': { transform: 'translate(0)' },
                            '20%': { transform: 'translate(-2px, 2px)' },
                            '40%': { transform: 'translate(-2px, -2px)' },
                            '60%': { transform: 'translate(2px, 2px)' },
                            '80%': { transform: 'translate(2px, -2px)' },
                            '100%': { transform: 'translate(0)' },
                        },
                        scanline: {
                            '0%': { transform: 'translateY(-100%)' },
                            '100%': { transform: 'translateY(100%)' }
                        }
                    }
                },
            },
        };
    </script>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-gray-900 dark:text-gray-100 min-h-screen relative overflow-x-hidden font-body selection:bg-primary selection:text-white">   
    <!-- <main class="relative z-10 pt-32 pb-20 px-6 min-h-screen flex flex-col justify-center items-center overflow-hidden"> -->
        
        <div class="container mx-auto grid grid-cols-1 lg:grid-cols-12 gap-12 items-center">
            <div class="lg:col-span-7 flex flex-col gap-6 text-left relative">
               
                <h1 class="text-6xl md:text-8xl font-display font-black leading-tight mb-2 tracking-tighter"
                    data-text="REALITY_SHIFT">                    
                    <span
                        class="block text-transparent bg-clip-text bg-gradient-to-r from-primary via-white to-secondary filter drop-shadow-[0_0_10px_rgba(217,0,255,0.5)]">ALCHEMIST</span>
                </h1>                
            </div>
        </div>
    <!-- </main>     -->
    <style>        
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #050014;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #D900FF;
        }
    </style>

</body>

</html>
